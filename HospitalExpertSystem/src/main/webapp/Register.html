<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="style.css">
    <style>
.container{
    width: 350px;
    margin: 100px auto;
    padding: 25px;
    background: rgba(255,255,255,0.95);
    border-radius: 12px;
    text-align: center;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
}
button {
            width: 60%;
            padding: 12px;
            font-size: 18px;
            background: #4a6cf7;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;

            display: block;
            margin: 15px auto;
        }

        button:hover {
            background: #2f4fe0;
        }
</style>
</head>
<body>

<div class="container">
    <h2>Register</h2>

    <form action="RegisterServlet" method="post">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Register</button>
    </form>

    <a href="Login.html">Already have account? Login</a>
</div>

</body>
</html>
